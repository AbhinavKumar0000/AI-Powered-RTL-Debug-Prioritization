<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer Chip Frame -->
  <rect x="12" y="12" width="40" height="40" rx="4" stroke="#4F8CFF" stroke-width="2.5" />
  
  <!-- Inner Core -->
  <rect x="24" y="24" width="16" height="16" rx="2" stroke="#4F8CFF" stroke-width="2.5" />
  
  <!-- Top Pins -->
  <line x1="20" y1="6" x2="20" y2="12" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="28" y1="6" x2="28" y2="12" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="36" y1="6" x2="36" y2="12" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="44" y1="6" x2="44" y2="12" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />

  <!-- Bottom Pins -->
  <line x1="20" y1="52" x2="20" y2="58" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="28" y1="52" x2="28" y2="58" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="36" y1="52" x2="36" y2="58" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="44" y1="52" x2="44" y2="58" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />

  <!-- Left Pins -->
  <line x1="6" y1="20" x2="12" y2="20" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="6" y1="28" x2="12" y2="28" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="6" y1="36" x2="12" y2="36" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="6" y1="44" x2="12" y2="44" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />

  <!-- Right Pins -->
  <line x1="52" y1="20" x2="58" y2="20" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="52" y1="28" x2="58" y2="28" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="52" y1="36" x2="58" y2="36" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="52" y1="44" x2="58" y2="44" stroke="#4F8CFF" stroke-width="2.5" stroke-linecap="round" />
</svg>
